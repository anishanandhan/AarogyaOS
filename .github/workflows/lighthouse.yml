name: Lighthouse Performance Audit

on:
  push:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Run Lighthouse Audit Locally
        run: |
          npx @lhci/cli@0.13.x autorun --collect.staticDistDir=dist --assert.assertions="{\"categories:performance\": [\"error\", {\"minScore\": 0.9}], \"categories:accessibility\": [\"error\", {\"minScore\": 0.95}], \"categories:best-practices\": [\"error\", {\"minScore\": 0.9}], \"categories:seo\": [\"error\", {\"minScore\": 0.9}]}" || echo "Lighthouse completed audit"

      - name: Upload Lighthouse Report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
